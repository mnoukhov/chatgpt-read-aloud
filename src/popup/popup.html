<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChatGPT Read Aloud</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>ChatGPT Read Aloud</h1>
  <div class="row">
    <label for="autoPlayToggle">Auto-play new responses</label>
    <label class="switch" aria-label="Auto-play toggle">
      <input type="checkbox" id="autoPlayToggle" />
      <span class="slider"></span>
    </label>
  </div>
  <div class="row">
    <label for="hideFeedbackToggle">Hide feedback buttons</label>
    <label class="switch" aria-label="Hide feedback buttons toggle">
      <input type="checkbox" id="hideFeedbackToggle" />
      <span class="slider"></span>
    </label>
  </div>
  <p class="status" id="statusMessage" hidden></p>
  <footer>
    Choose what ChatGPT reads and what stays visible.
  </footer>
  <script src="popup.js"></script>
</body>
</html>
